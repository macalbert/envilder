name: 📦 Publish PyPI Package

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/sdks/python/**"
      - "tests/sdks/python/**"
      - ".github/workflows/publish-pypi.yml"

permissions:
  id-token: write
  contents: write

jobs:
  publish-pypi:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: src/sdks/python

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v7

      - name: 👑 Detect version bump
        id: version-check
        run: |
          CURRENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PUBLISHED_VERSION=$(pip index versions envilder 2>/dev/null | grep -oP 'envilder \(\K[^)]+' || echo "0.0.0")

          echo "Current version: $CURRENT_VERSION, Published version: $PUBLISHED_VERSION"

          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Version has been bumped from $PUBLISHED_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed. Will not publish."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 🪙 Collect Coins (Configure AWS credentials)
        if: steps.version-check.outputs.version_changed == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ♻️ Install dependencies
        if: steps.version-check.outputs.version_changed == 'true'
        run: make -C ../../.. install-sdk-python

      - name: 🌟 Format + type check
        if: steps.version-check.outputs.version_changed == 'true'
        run: make -C ../../.. check-sdk-python

      - name: 🍄 Run tests
        if: steps.version-check.outputs.version_changed == 'true'
        run: make -C ../../.. test-sdk-python
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: 🏗️ Build package
        if: steps.version-check.outputs.version_changed == 'true'
        run: uv build

      - name: 🚩 Publish to PyPI
        if: steps.version-check.outputs.version_changed == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: src/sdks/python/dist/

      - name: 🏁 Create version tag
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk-python/v${{ steps.version-check.outputs.current_version }}" -m "Release Envilder Python SDK v${{ steps.version-check.outputs.current_version }}"
          git push origin "sdk-python/v${{ steps.version-check.outputs.current_version }}"

      - name: 🏰 Create Release
        if: steps.version-check.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: "sdk-python/v${{ steps.version-check.outputs.current_version }}"
          name: "🐍 Envilder Python SDK v${{ steps.version-check.outputs.current_version }}"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
