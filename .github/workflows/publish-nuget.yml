name: 📦 Publish NuGet Package

on:
  workflow_dispatch:
  
  push:
    branches:
      - main
    paths:
      - "src/sdks/dotnet/**"
      - ".github/workflows/publish-nuget.yml"

permissions:
  id-token: write
  contents: write

jobs:
  publish-nuget:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: src/sdks/dotnet

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: 👑 Detect version bump
        id: version-check
        run: |
          CURRENT_VERSION=$(grep -oP '<Version>\K[^<]+' Envilder.csproj)
          PUBLISHED_VERSION=$(dotnet package search Envilder --source https://api.nuget.org/v3/index.json --exact-match --format json 2>/dev/null | jq -r '.searchResult[0].packages[0].latestVersion // "0.0.0"')

          echo "Current version: $CURRENT_VERSION, Published version: $PUBLISHED_VERSION"

          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Version has been bumped from $PUBLISHED_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed. Will not publish."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ Build
        if: steps.version-check.outputs.version_changed == 'true'
        run: dotnet build -c Release

      - name: 🍄 Run tests
        if: steps.version-check.outputs.version_changed == 'true'
        run: dotnet test ../../../tests/sdks/dotnet/ -c Release --filter "FullyQualifiedName!~Acceptance" --verbosity normal

      - name: 📦 Pack
        if: steps.version-check.outputs.version_changed == 'true'
        run: dotnet pack -c Release --no-build -o ./nupkg

      - name: � NuGet login (OIDC)
        if: steps.version-check.outputs.version_changed == 'true'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: 🚩 Publish to NuGet
        if: steps.version-check.outputs.version_changed == 'true'
        run: dotnet nuget push ./nupkg/Envilder.${{ steps.version-check.outputs.current_version }}.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: 🏁 Create version tag
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk-dotnet/v${{ steps.version-check.outputs.current_version }}" -m "Release Envilder .NET SDK v${{ steps.version-check.outputs.current_version }}"
          git push origin "sdk-dotnet/v${{ steps.version-check.outputs.current_version }}"

      - name: 🏰 Create Release
        if: steps.version-check.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: "sdk-dotnet/v${{ steps.version-check.outputs.current_version }}"
          name: "📦 Envilder .NET SDK v${{ steps.version-check.outputs.current_version }}"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
