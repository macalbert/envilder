name: 🐍 Python SDK Tests

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:

  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - '.github/workflows/tests-python-sdk.yml'
      - 'src/sdks/python/**'
      - 'tests/sdks/python/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  test-python-sdk:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ['3.10', '3.13']

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v6

      - name: 🪙 Collect Coins (Configure AWS credentials)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: ♻️ Install dependencies
        run: uv pip install --system -e "src/sdks/python[dev]"

      - name: 🔀 Import sorting check
        run: |
          cd src/sdks/python && python -m isort --check-only envilder/
          cd tests/sdks/python && python -m isort --check-only .

      - name: 🎨 Format check
        run: |
          cd src/sdks/python && python -m black --check envilder/
          cd tests/sdks/python && python -m black --check .

      - name: 🔍 Type check
        run: cd src/sdks/python && python -m mypy envilder/

      - name: 🍄 Run tests
        run: cd tests/sdks/python && python -m pytest -v --junitxml=test-results-${{ matrix.python-version }}.xml
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
          DOCKER_HOST: unix:///var/run/docker.sock

      - uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: python-test-results-${{ matrix.python-version }}
          path: |
            tests/sdks/python/test-results-${{ matrix.python-version }}.xml
          retention-days: 1

  test-python-sdk-report:
    permissions:
      checks: write
      contents: read
    runs-on: ubuntu-latest
    needs: [test-python-sdk]

    if: ${{ success() || failure() }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: .
          pattern: python-test-results-*

      - name: 📊 Generating Tests Results Reporter
        uses: dorny/test-reporter@v3
        with:
          name: Python SDK Test Results
          path: "**/test-results.xml"
          path-replace-backslashes: "false"
          reporter: java-junit
          only-summary: "false"
          list-suites: "all"
          list-tests: "all"
          max-annotations: "10"
          fail-on-error: "true"
          working-directory: ""
