name: 📦 Publish NPM SDK Package

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/sdks/typescript/**"
      - "tests/sdks/typescript/**"
      - ".github/workflows/publish-npm-sdk.yml"

permissions:
  id-token: write
  contents: write

jobs:
  publish-npm-sdk:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: src/sdks/typescript

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: 👑 Detect version bump
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          HTTP_CODE=$(curl -s -o /tmp/npm-response.json -w '%{http_code}' \
            "https://registry.npmjs.org/@envilder/sdk/latest")

          if [ "$HTTP_CODE" = "200" ]; then
            PUBLISHED_VERSION=$(jq -r '.version // "0.0.0"' /tmp/npm-response.json)
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Package not found on npm — first publish."
            PUBLISHED_VERSION="0.0.0"
          else
            echo "::error::npm registry returned unexpected HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Current version: $CURRENT_VERSION, Published version: $PUBLISHED_VERSION"

          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Version has been bumped from $PUBLISHED_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed. Will not publish."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Install dependencies
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: 🌟 Format check
        if: steps.version-check.outputs.version_changed == 'true'
        run: npx biome check src/sdks/typescript/src/ tests/sdks/typescript/
        working-directory: .

      - name: 🏗️ Build
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm build

      - name: 🍄 Run tests
        if: steps.version-check.outputs.version_changed == 'true'
        run: cd ../../../tests/sdks/typescript && pnpm vitest run --reporter=verbose

      - name: 🚩 Publish to npm
        if: steps.version-check.outputs.version_changed == 'true'
        run: npm publish --provenance --access public

      - name: 🏁 Create version tag
        if: steps.version-check.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "sdk-typescript/v${{ steps.version-check.outputs.current_version }}" -m "Release Envilder TypeScript SDK v${{ steps.version-check.outputs.current_version }}"
          git push origin "sdk-typescript/v${{ steps.version-check.outputs.current_version }}"

      - name: 🏰 Create Release
        if: steps.version-check.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: "sdk-typescript/v${{ steps.version-check.outputs.current_version }}"
          name: "🟦 Envilder TypeScript SDK v${{ steps.version-check.outputs.current_version }}"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
