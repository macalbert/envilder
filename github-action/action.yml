name: "Envilder GitHub Action"
description: "Pull secrets from AWS SSM or Azure Key Vault into .env files for your CI/CD workflows"
author: "macalbert"

branding:
  icon: "lock"
  color: "orange"

inputs:
  map-file:
    description: "Path to the JSON file mapping environment variables to secret paths"
    required: true
  env-file:
    description: "Path to the .env file to generate"
    required: true
  provider:
    description: "Cloud provider to use: aws or azure (default: aws)"
    required: false
    default: "aws"

outputs:
  env-file-path:
    description: "Path to the generated .env file"
    value: ${{ inputs.env-file }}

runs:
  using: "composite"
  steps:
    - name: 🔐 Pull secrets into .env
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_MAP_FILE: ${{ inputs.map-file }}
        INPUT_ENV_FILE: ${{ inputs.env-file }}
        INPUT_PROVIDER: ${{ inputs.provider }}
      run: |
        node "${{ github.action_path }}/dist/index.js"
