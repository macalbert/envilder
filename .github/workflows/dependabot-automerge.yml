name: 🔎 Dependabot Update Review

# Validates Dependabot update metadata and reminds maintainers that updates
# require manual review and merge.
#
# Uses pull_request_target to read Dependabot metadata with repository-scoped
# read permissions. This is safe because the job never checks out or executes
# any code from the PR head, and it never merges a pull request.
#
# Gated on the PR author (not github.actor) so a maintainer clicking
# "Update branch" (which re-triggers synchronize as its own actor) doesn't
# skip this job on a Dependabot PR.

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  review:
    name: Review Dependabot update
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: 📋 Fetch Dependabot metadata
        id: meta
        # Maintainer repair commits can fail strict verification. Keep this
        # nonfatal so the pull request remains available for manual review.
        continue-on-error: true
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: ⚠️ Warn when metadata cannot be verified
        if: steps.meta.outcome == 'failure'
        run: |
          echo "::warning title=Metadata verification failed::Dependabot commit verification failed. Review the pull request manually."

      - name: ℹ️ Require manual merge
        run: |
          echo "::notice title=Manual merge required::This workflow never enables auto-merge. Review and merge after required checks pass."
