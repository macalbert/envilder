name: 📦 Publish NPM Package

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "src/envilder/**"
      - "tests/envilder/**"
      - "e2e/**"
      - "package.json"
      - ".github/workflows/publish-npm.yml"

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: 👑 Detect version bump
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          HTTP_CODE=$(curl -s -o /tmp/npm-response.json -w '%{http_code}' \
            "https://registry.npmjs.org/envilder/latest")

          if [ "$HTTP_CODE" = "200" ]; then
            PUBLISHED_VERSION=$(jq -r '.version // "0.0.0"' /tmp/npm-response.json)
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Package not found on npm — first publish."
            PUBLISHED_VERSION="0.0.0"
          else
            echo "::error::npm registry returned unexpected HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Current version: $CURRENT_VERSION, Published version: $PUBLISHED_VERSION"

          if [ "$CURRENT_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Version has been bumped from $PUBLISHED_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed. Will not publish."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 💉 Configure AWS credentials
        if: steps.version-check.outputs.version_changed == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🌟 Install dependencies
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: 🔥 Lint
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm lint

      - name: 🍄 Run tests
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm test
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: 🏗️ Build package
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm build

      - name: 🚩 Publish to npm
        if: steps.version-check.outputs.version_changed == 'true'
        run: pnpm run release:publish

      - name: 🏰 Create release
        if: steps.version-check.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ steps.version-check.outputs.current_version }}"
          name: "🍄 Envilder level up v${{ steps.version-check.outputs.current_version }}"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: legacy
          replacesArtifacts: true
