      - patch
    dev-minor-patch:
      dependency-type: development
      update-types:
      - minor
      - patch
    prod-minor-patch:
      dependency-type: production
      update-types:
      - minor
      - patch
  labels:
  - "nuget"
  - "dependencies"
  assignees:
  - macalbert

