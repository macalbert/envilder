name: 🌍 World 1-1 Website CI

on:
  workflow_dispatch:

  pull_request:
    branches:
      - "*"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  # No `paths:` filter here on purpose: a required check gated by a
  # workflow-level `paths:` filter never posts a status when skipped and
  # blocks merging forever. A job-level `if:` skip reports "success"
  # instead, so the path check moves here and gates website-ci below.
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      website: ${{ steps.filter.outputs.website }}
    steps:
      - name: 🧱 Checkout
        uses: actions/checkout@v7
      - name: 🔍 Detect relevant changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            website:
              - ".github/workflows/tests-website.yml"
              - "src/website/**"
              - "tests/website/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"

  website-ci:
    needs: changes
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' || (needs.changes.outputs.website == 'true' && !github.event.pull_request.draft) }}
    timeout-minutes: 15

    steps:
      - name: 🧱 Enter the Pipe (Checkout)
        uses: actions/checkout@v7

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v6

      - name: 🍄 Grab a Mushroom (Setup Node.js with Cache)
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 📦 Open the ? Block (Install packages)
        run: pnpm install --frozen-lockfile

      - name: 🌟 Shine Sprite (Run formatting checker)
        run: pnpm --filter @envilder/website format:check

      - name: 🏁 Flagpole (Run code quality checker)
        run: pnpm --filter @envilder/website lint

      - name: 🏗️ Build the Castle (Build website)
        run: pnpm --filter @envilder/website build

      - name: 🏎️ Race Through the Track (Run website tests)
        run: pnpm --filter @envilder/website-tests test
